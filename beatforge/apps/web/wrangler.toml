"""
@file wrangler.toml
@description Cloudflare Workers configuration for BeatForge.
Bindings for R2, KV, Queues, Hyperdrive, and service bindings.

Deploy with: wrangler pages deploy .next/static

- R2: beatforge-media (audio files, cover art, waveforms)
- KV: rate-limiting, session cache, analytics buffer
- Queues: email, analytics processing
- Hyperdrive: database connection pooling
"""

name = "beatforge-web"
type = "javascript"
account_id = ""
workers_dev = true
main = ".wrangler/tmp/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat_v2", "streams_enable_constructors"]

# ============================================================
# Environment Configuration
# ============================================================

[env.development]
name = "beatforge-dev"
routes = [
  { pattern = "*.dev.beatforge.io", zone_id = "" }
]

[env.production]
name = "beatforge"
routes = [
  { pattern = "beatforge.io", zone_id = "" },
  { pattern = "www.beatforge.io", zone_id = "" }
]

# ============================================================
# Build Configuration
# ============================================================

[build]
cwd = "."
command = "npm run build"
watch_paths = ["src/**/*.ts", "src/**/*.tsx"]

[build.upload]
format = "service-worker"

# ============================================================
# R2 BUCKET BINDINGS (Audio, Images, Waveforms)
# ============================================================

[[r2_buckets]]
binding = "R2"
bucket_name = "beatforge-media"
jurisdiction = "eu"

[[r2_buckets]]
binding = "R2_PREVIEW"
bucket_name = "beatforge-previews"
jurisdiction = "eu"

# ============================================================
# KV NAMESPACE BINDINGS (Cache, Rate Limiting, Sessions)
# ============================================================

[[kv_namespaces]]
binding = "KV_CACHE"
id = ""
preview_id = ""

[[kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = ""
preview_id = ""

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = ""
preview_id = ""

# ============================================================
# HYPERDRIVE DATABASE BINDING (Connection Pooling)
# ============================================================

[[hyperdrive]]
binding = "HYPERDRIVE"
id = ""

# ============================================================
# CLOUDFLARE QUEUES (Background Jobs)
# ============================================================

[[queues.producers]]
binding = "QUEUE_EMAIL"
queue = "email-queue"

[[queues.producers]]
binding = "QUEUE_ANALYTICS"
queue = "analytics-queue"

[[queues.producers]]
binding = "QUEUE_NOTIFICATIONS"
queue = "notifications-queue"

# ============================================================
# DURABLE OBJECTS (Real-Time Updates)
# ============================================================

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[durable_objects.bindings]]
name = "SESSION_STORE"
class_name = "SessionStore"

# ============================================================
# SERVICE BINDINGS (Call other Workers)
# ============================================================

# [[services]]
# binding = "API_WORKER"
# service = "beatforge-api"
# environment = "production"

# ============================================================
# ANALYTICS ENGINE (Metrics Collection)
# ============================================================

[analytics]
enabled = true

# ============================================================
# CLOUDFLARE D1 (Optional SQLite Layer for Cache)
# ============================================================

# [[d1_databases]]
# binding = "D1_CACHE"
# database_id = ""
# database_name = "beatforge_cache"

# ============================================================
# ENVIRONMENT VARIABLES (from .dev.vars)
# ============================================================

[env.development.vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"

[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"

# ============================================================
# TRIGGERS (Cron Jobs)
# ============================================================

[[triggers.crons]]
cron = "0 0 * * *"  # Daily at midnight

[[triggers.scheduled]]
crons = ["0 */1 * * *"]  # Every hour
